<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Netlabs API - Swagger UI Documentation</title>
    <!-- Swagger UI CSS -->
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui.css" />
    <link rel="icon" type="image/png" href="https://unpkg.com/swagger-ui-dist@5.9.0/favicon-32x32.png" sizes="32x32" />
    <style>
        html {
            box-sizing: border-box;
            overflow: -y-scroll;
        }
        *, *:before, *:after {
            box-sizing: inherit;
        }
        body {
            margin: 0;
            background: #fafafa;
            font-family: sans-serif;
        }
        /* Custom Topbar matching Netlabs Blue Theme */
        .swagger-ui .topbar {
            background-color: #1e3a8a !important; /* Navy blue */
            padding: 12px 0;
            border-bottom: 3px solid #3b82f6;
        }
        .swagger-ui .topbar .download-url-wrapper {
            display: none !important; /* Hide input box for cleaner look */
        }
        .custom-title {
            color: white;
            font-size: 20px;
            font-weight: bold;
            margin-left: 20px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <!-- Topbar Header -->
    <div class="swagger-ui">
        <div class="topbar">
            <div class="wrapper">
                <div class="custom-title">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: #3b82f6;"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                    <span>Netlabs API Documentation</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Swagger UI Render Target -->
    <div id="swagger-ui"></div>

    <!-- Swagger UI Bundle Scripts -->
    <script src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-bundle.js"></script>
    <script src="https://unpkg.com/swagger-ui-dist@5.9.0/swagger-ui-standalone-preset.js"></script>
    <script>
        window.onload = () => {
            window.ui = SwaggerUIBundle({
                url: '/docs/openapi.yaml',
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: "BaseLayout",
                persistAuthorization: true,
                docExpansion: "list"
            });
        };
    </script>
</body>
</html>
